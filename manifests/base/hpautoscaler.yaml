apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: delta-sharing-server-hpa
  namespace: default
  labels:
    app: delta-sharing-server
    project: delta-sharing-server
  annotations:
    zenoss.spinnaker_deploy: "true"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: delta-sharing-server
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
